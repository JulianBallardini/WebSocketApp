<div class="min-h-screen bg-gray-900 flex items-center justify-center p-4">
  <div class="w-full max-w-md bg-gray-800 rounded-xl shadow-2xl overflow-hidden p-8">
    <div class="text-center mb-8">
      <div class="w-16 h-16 rounded-full bg-indigo-500 flex items-center justify-center mx-auto mb-4">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" class="w-8 h-8 text-white">
          <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-white">Bienvenido al Chat</h1>
      <p class="text-gray-400 mt-2">Ingresa tu nombre de usuario para continuar</p>
    </div>

    @if (error()) {
      <div class="mb-6 p-4 bg-red-500/20 border border-red-500/50 rounded-lg">
        <p class="text-red-400 text-sm">{{ error() }}</p>
      </div>
    }

    <form (ngSubmit)="onSubmit()" class="space-y-6">
      <div>
        <label class="block text-gray-400 text-sm mb-2">Nombre de usuario</label>
        <input
          type="text"
          [(ngModel)]="username"
          name="username"
          placeholder="Ingresa tu usuario..."
          class="w-full px-4 py-3 bg-gray-700 border border-gray-600 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-colors"
          required
        >
      </div>

      <div>
        <label class="block text-gray-400 text-sm mb-2">Contraseña (opcional)</label>
        <input
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder="Solo para admin..."
          class="w-full px-4 py-3 bg-gray-700 border border-gray-600 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-colors"
        >
        <p class="text-gray-500 text-xs mt-1">Sin contraseña = USER | Con contraseña = ADMIN</p>
      </div>

      <button
        type="submit"
        [disabled]="loading() || !username.trim()"
        class="w-full py-3 bg-indigo-500 hover:bg-indigo-600 disabled:bg-gray-600 disabled:cursor-not-allowed text-white font-semibold rounded-lg transition-colors"
      >
        @if (loading()) {
          <span class="flex items-center justify-center gap-2">
            <svg class="animate-spin h-5 w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            Conectando...
          </span>
        } @else {
          {{ password.trim() ? 'Iniciar Sesión' : 'Entrar como Guest' }}
        }
      </button>
    </form>
  </div>
</div>
